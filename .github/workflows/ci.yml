name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  ci:
    name: Typecheck, lint, format, build, test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm typecheck

      - name: Lint
        run: pnpm lint

      - name: Format
        run: pnpm format:check

      - name: Build
        run: pnpm build

      - name: Unit tests
        run: pnpm test

      - name: Install Playwright browsers
        run: pnpm --filter @belot/e2e install-browsers:ci

      - name: E2E tests
        run: pnpm test:e2e
