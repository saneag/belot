name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  ci:
    name: Typecheck, lint, format, build, test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm typecheck

      - name: Lint
        run: pnpm lint

      - name: Format
        run: pnpm format:check

      - name: Build
        run: pnpm build

      - name: Unit tests with coverage
        run: pnpm test:coverage

      - name: Generate coverage summary
        run: node scripts/coverage-summary.mjs --output .coverage/coverage-summary.md

      - name: Add coverage to job summary
        run: cat .coverage/coverage-summary.md >> "$GITHUB_STEP_SUMMARY"

      - name: Comment coverage on pull request
        if: github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          header: coverage
          path: .coverage/coverage-summary.md

      - name: Install Playwright browsers
        run: pnpm --filter @belot/e2e install-browsers:ci

      - name: E2E tests
        run: pnpm test:e2e
